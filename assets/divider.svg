<svg width="100%" height="8" viewBox="0 0 1200 8" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:0" />
      <stop offset="20%" style="stop-color:#6C63FF;stop-opacity:1">
        <animate attributeName="offset" values="0.05;0.20;0.05" dur="4s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#6C63FF;stop-opacity:1">
        <animate attributeName="offset" values="0.95;0.80;0.95" dur="4s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" style="stop-color:#0D1117;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="1.5" y="3" rx="1" fill="url(#line-grad)" filter="url(#glow)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite" />
  </rect>
</svg>
